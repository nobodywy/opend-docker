version: "3.8"

services:
  opend:
    build: .
    container_name: opend
    restart: unless-stopped
    environment:
      # ── 填入你的真实富途账号 ─────────────────
      # OpenD 10.6+ 必须有真实凭据才能启动，不再支持空凭据+GUI弹出登录
      FUTU_LOGIN_ACCOUNT: "你的牛牛号"
      FUTU_LOGIN_PWD: "你的密码"

      # 虚拟桌面分辨率
      - VNC_RESOLUTION=1280x720x16

    volumes:
      # ── 持久化 OpenD 配置（登录态、偏好设置）────
      # 把 ./opend-config 映射到容器 /config
      # 如果有自定义 OpenD.xml 放这个目录里
      - ./opend-config:/config

    networks:
      openclaw_lan_net:
        ipv4_address: <OPEND_IP>

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── 外部网络：复用飞牛上已有的 macvlan ────────────
networks:
  openclaw_lan_net:
    external: true
    name: openclaw_lan_net
